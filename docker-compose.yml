services:
  postgres:
    image: postgres:16-alpine
    container_name: rustcraft-postgres
    environment:
      POSTGRES_USER: rustcraft
      POSTGRES_PASSWORD: rustcraft
      POSTGRES_DB: rustcraft
    ports:
      - "5433:5432"
    volumes:
      - rustcraft-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustcraft"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  rustcraft-pgdata:
